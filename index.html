<style>
/* 디자인 아이덴티티 변수 선언 */
:root {
  --purple: #6E4FD0;
  --purple-2: #8465E5;
  --purple-3: #593BB5;
  --purple-bg: #F4F2FA;
  --bg: #FAFAFC;
  --bg-2: #FFFFFF;
  --ink: #1C1B20;
  --ink-2: #494650;
  --ink-3: #7A7685;
  --border: #ECEAF0;
  --border-2: #DCD8E5;
  --teal: #14B8A6;
  --teal-bg: #E6F7F5;
  --coral: #F43F5E;
  --coral-bg: #FFEBEF;
  --gray-bg: #F0EFF3;
  --muted: #9D99A8;
}

/* 글로벌 Reset & 기본 스타일 */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: var(--purple-bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

/* 공통 버튼 스타일 */
.btn { display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s ease; gap: 6px; }
.btn-primary { background: var(--purple); color: #FFF; }
.btn-primary:hover { background: var(--purple-3); }
.btn-outline { background: transparent; color: var(--purple); border: 1.5px solid var(--border-2); }
.btn-outline:hover { background: var(--purple-bg); border-color: var(--purple-3); }
.btn-ghost { background: var(--bg); color: var(--ink-3); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-2); }
.btn-danger { background: var(--coral-bg); color: var(--coral); }
.btn-danger:hover { background: var(--coral); color: #FFF; }

/* 테이블 패킹 스타일 */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
th { font-size: 11.5px; padding: 10px 12px; text-transform: uppercase; color: var(--ink-3); letter-spacing: 0.5px; }
td { font-size: 13px; padding: 11px 12px; border-bottom: 1px solid var(--border); }

/* 모달 팝업 구조 */
.modal { padding: 22px 20px !important; width: 88vw !important; max-width: 620px !important; max-height: 88vh; border-radius: 18px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #FFF; box-shadow: 0 12px 36px rgba(0,0,0,0.15); z-index: 1000; }
.modal.open { display: block; }
.modal-footer { gap: 8px; display: flex; justify-content: flex-end; margin-top: 16px; }

/* 입력 폼 최적화 */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; }
.form-input { width: 100%; height: 44px; padding: 0 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--ink); transition: border-color 0.2s; background: #FFF; }
.form-input:focus { border-color: var(--purple); outline: none; }

/* 뱃지 스타일 */
.badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-coral { background: var(--coral-bg); color: var(--coral); }
.badge-gray { background: var(--gray-bg); color: var(--ink-3); }

@media (max-width: 768px) {
  .modal { width: 94vw !important; padding: 16px !important; }
}
</style>

// 날짜 헬퍼 함수
function kstDate() { return new Date(new Date().getTime() + (9 * 60 * 60 * 1000)); }
function kstDateStr() { return kstDate().toISOString().split('T')[0]; }
function kstMonthStr() { return kstDateStr().substring(0,7); }
let currentTuitionMonth = kstMonthStr();
let matUseId = null;

// 로컬 DB 로드 함수
function loadDb() {
  try {
    const s = _storage.getItem('luke_artschool_v2');
    if (s) {
      const d = JSON.parse(s);
      if(d.members) db = d;
    }
  } catch(e) { console.error("DB 로드 실패:", e); }
}

function saveDb() {
  try {
    _storage.setItem('luke_artschool_v2', JSON.stringify(db));
    saveSnapshot(); // 데이터 변화 발생 시 상시 스냅샷 누적 저장 백업 호출
  } catch(e) { console.error("DB 저장 실패:", e); }
}
