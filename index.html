<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦑 두족류 낚시 가이드 - 울산~남해</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
        .section { display: none; }
        .section.active { display: block; }
        .leaflet-container { height: 300px; border-radius: 20px; }
    </style>
</head>
<body class="bg-white text-slate-800 max-w-[480px] mx-auto">
    
    <!-- Header -->
    <div class="sticky top-0 z-50 bg-white border-b px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-11 h-11">
                <svg viewBox="0 0 48 48" class="w-full h-full"><ellipse cx="24" cy="20" rx="11" ry="14" fill="#06b6d4"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold">두족류 낚시 가이드</h1>
                <p class="text-[10px] text-slate-500">울산 ~ 남해 • v2.1</p>
            </div>
        </div>
        <div onclick="installPWA()" class="bg-[#06b6d4] text-white text-xs px-3 py-1.5 rounded-2xl cursor-pointer">
            <i class="fa-solid fa-download mr-1"></i> 앱 설치
        </div>
    </div>

    <div class="pb-20">
        <!-- HOME -->
        <section id="home" class="section active px-4 pt-4">
            <h2 class="text-3xl font-bold mb-4">오늘의 낚시 컨디션</h2>
            
            <div onclick="switchSection('weather')" class="bg-white border rounded-3xl p-5 mb-6 cursor-pointer">
                <div class="flex justify-between">
                    <div>
                        <div id="home-temp" class="text-5xl font-bold">—</div>
                        <div id="home-desc" class="text-slate-600">날씨 로딩 중...</div>
                    </div>
                    <div id="home-icon" class="text-6xl">🌡️</div>
                </div>
                <div class="mt-4 pt-4 border-t grid grid-cols-2 text-sm">
                    <div>바람: <span id="home-wind">—</span></div>
                    <div>파도: <span id="home-wave">—</span></div>
                </div>
            </div>
        </section>

        <!-- WEATHER -->
        <section id="weather" class="section px-4 pt-4">
            <h2 class="text-2xl font-bold mb-4">날씨 &amp; 조석</h2>
            <div id="weather-content" class="bg-white border rounded-3xl p-5">
                로딩 중...
            </div>
        </section>

        <!-- SPECIES -->
        <section id="species" class="section px-4 pt-4 pb-24">
            <h2 class="text-2xl font-bold mb-4">두족류 도감</h2>
            <div id="species-grid" class="grid grid-cols-2 gap-3"></div>
        </section>

        <!-- GUIDE -->
        <section id="guide" class="section px-4 pt-4">
            <h2 class="text-2xl font-bold mb-4">가이드북</h2>
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-4">
                <div onclick="switchGuideTab(0)" class="flex-1 text-center py-2 rounded-[14px] cursor-pointer font-medium bg-white" id="guide-tab-0">낚시 방법</div>
                <div onclick="switchGuideTab(1)" class="flex-1 text-center py-2 rounded-[14px] cursor-pointer font-medium" id="guide-tab-1">매듭</div>
            </div>
            <div id="guide-content-0">
                <div class="bg-white border rounded-3xl p-5">도보 / 선상 정보</div>
            </div>
            <div id="guide-content-1" class="hidden">
                <div class="bg-white border rounded-3xl p-5">FG Knot + 영상 링크</div>
            </div>
        </section>

        <!-- POINTS -->
        <section id="points" class="section px-4 pt-4">
            <h2 class="text-2xl font-bold mb-4">포인트</h2>
            <div id="map" class="leaflet-container mb-6"></div>
        </section>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 bg-white border-t w-full max-w-[480px] mx-auto z-50">
        <div class="grid grid-cols-5 text-center text-xs py-2">
            <div onclick="switchSection('home')" class="cursor-pointer">🏠<br><span class="text-[10px]">홈</span></div>
            <div onclick="switchSection('weather')" class="cursor-pointer">🌤️<br><span class="text-[10px]">날씨</span></div>
            <div onclick="switchSection('species')" class="cursor-pointer">🦑<br><span class="text-[10px]">어종</span></div>
            <div onclick="switchSection('guide')" class="cursor-pointer">📖<br><span class="text-[10px]">가이드</span></div>
            <div onclick="switchSection('points')" class="cursor-pointer">📍<br><span class="text-[10px]">포인트</span></div>
        </div>
    </div>

    <script>
        // Weather
        async function loadWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.5394&longitude=129.3114&current=temperature_2m,wind_speed_10m,weather_code&timezone=Asia%2FSeoul');
                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const wind = Math.round(data.current.wind_speed_10m);
                const wave = wind > 15 ? "1.2~1.8m" : "0.6~1.0m";

                document.getElementById('home-temp').textContent = temp;
                document.getElementById('home-desc').textContent = "현재 날씨";
                document.getElementById('home-wind').textContent = wind + " km/h";
                document.getElementById('home-wave').textContent = wave;

                document.getElementById('weather-content').innerHTML = `
                    <div>온도: ${temp}°C<br>바람: ${wind} km/h<br>파도: ${wave}<br>조석: 만조 14:30경</div>
                `;
            } catch(e) {
                console.log("Weather error");
            }
        }

        // Species
        function renderSpecies() {
            const grid = document.getElementById('species-grid');
            const data = [
                {name:"주꾸미", emoji:"🐙", tip:"바닥 접촉"},
                {name:"갑오징어", emoji:"🦑", tip:"20~50cm 띄움"},
                {name:"문어", emoji:"🐙", tip:"강한 힘 주의"},
                {name:"한치", emoji:"🦑", tip:"선상 전문"},
                {name:"무늬오징어", emoji:"🦑", tip:"예민"}
            ];
            grid.innerHTML = data.map(s => `
                <div class="bg-white border rounded-3xl p-4">
                    <div class="text-5xl mb-2">${s.emoji}</div>
                    <div class="font-bold">${s.name}</div>
                    <div class="text-sm text-slate-600">${s.tip}</div>
                </div>
            `).join('');
        }

        function initMap() {
            const map = L.map('map').setView([34.85, 128.0], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([34.85, 128.1]).addTo(map).bindPopup('거제 홍도');
            L.marker([34.9, 127.9]).addTo(map).bindPopup('남해 창선');
        }

        function switchSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'weather') loadWeather();
            if (id === 'points') initMap();
        }

        function switchGuideTab(tab) {
            document.querySelectorAll('[id^="guide-content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('guide-content-' + tab).classList.remove('hidden');
        }

        function installPWA() {
            alert('브라우저 메뉴에서 "홈 화면에 추가"를 눌러주세요!');
        }

        // 강제 업데이트 알림
        function checkForUpdate() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.update();
                });
            }
        }

        function init() {
            renderSpecies();
            loadWeather();
            checkForUpdate(); // 강제 업데이트 확인

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW 등록됨:', reg.scope))
                    .catch(err => console.log('SW 실패'));
            }
            
            console.log('%c[v2.1] 캐시 강제 업데이트 버전 초기화 완료', 'color:#06b6d4');
        }

        window.onload = init;
    </script>
</body>
</html>
