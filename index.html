<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 블로그 자동화 — 로그인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0d0d1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.12) 0%,transparent 60%);pointer-events:none}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.logo-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#818cf8,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.logo-sub{font-size:13px;color:#6b7280}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;color:#9ca3af;margin-bottom:7px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.input-wrap{position:relative}
input[type=password]{width:100%;padding:13px 48px 13px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:11px;color:#e2e2e2;font-size:15px;font-family:inherit;outline:none;transition:all .2s;letter-spacing:3px}
input[type=password]::placeholder{letter-spacing:0;color:#4b5563;font-size:14px}
input[type=password]:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px;padding:4px;line-height:1}
.toggle-pw:hover{color:#a78bfa}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 14px;color:#f87171;font-size:13px;margin-top:14px;display:none;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:28px;font-size:12px;color:#374151}
.capslock-warn{font-size:11px;color:#fbbf24;margin-top:5px;display:none}
</style>
</head>
<body>
<div class="bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-title">AI 블로그 수익화 자동화</div>
    <div class="logo-sub">접근하려면 비밀번호를 입력하세요</div>
  </div>

  <div class="form-group">
    <label>비밀번호</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="비밀번호 입력" onkeydown="handleKey(event)" oninput="checkCaps(event)" autocomplete="current-password">
      <button class="toggle-pw" onclick="togglePw()" type="button" id="eyeBtn">👁</button>
    </div>
    <div class="capslock-warn" id="capsWarn">⚠️ Caps Lock이 켜져 있습니다</div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    🔐 로그인
  </button>

  <div class="error" id="errMsg">
    ❌ 비밀번호가 올바르지 않습니다
  </div>

  <div class="footer">보안을 위해 비밀번호는 암호화되어 저장됩니다</div>
</div>

<script>
const SALT = 'yblog_salt_2024';
const STORED_HASH = 'af176805df287cd3b56f650be6d6d30e2ffe88fa724b37121c51d79d87d1de58';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pw').value;
  if (!pw) { shake(); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 확인 중...';

  const hash = await sha256(pw + SALT);

  if (hash === STORED_HASH) {
    sessionStorage.setItem('yblog_auth', btoa(Date.now().toString()));
    btn.innerHTML = '✅ 로그인 성공!';
    setTimeout(() => { window.location.href = 'app.html'; }, 500);
  } else {
    btn.disabled = false;
    btn.innerHTML = '🔐 로그인';
    shake();
  }
}

function shake() {
  const err = document.getElementById('errMsg');
  err.style.display = 'block';
  err.style.animation = 'none';
  setTimeout(() => err.style.animation = 'shake .3s', 10);
}

function handleKey(e) {
  if (e.key === 'Enter') doLogin();
}

function togglePw() {
  const input = document.getElementById('pw');
  const btn = document.getElementById('eyeBtn');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}

function checkCaps(e) {
  document.getElementById('errMsg').style.display = 'none';
}

window.addEventListener('keyup', function(e) {
  if (e.getModifierState) {
    const caps = e.getModifierState('CapsLock');
    document.getElementById('capsWarn').style.display = caps ? 'block' : 'none';
  }
});

// 이미 로그인된 경우 바로 이동
if (sessionStorage.getItem('yblog_auth')) {
  window.location.href = 'app.html';
}

document.getElementById('pw').focus();
</script>
</body>
</html>
