<style>
/* 디자인 아이덴티티 변수 선언 */
:root {
  --purple: #6E4FD0;
  --purple-2: #8465E5;
  --purple-3: #593BB5;
  --purple-bg: #F4F2FA;
  --bg: #FAFAFC;
  --bg-2: #FFFFFF;
  --ink: #1C1B20;
  --ink-2: #494650;
  --ink-3: #7A7685;
  --border: #ECEAF0;
  --border-2: #DCD8E5;
  --teal: #14B8A6;
  --teal-bg: #E6F7F5;
  --coral: #F43F5E;
  --coral-bg: #FFEBEF;
  --gray-bg: #F0EFF3;
  --muted: #9D99A8;
}

/* 글로벌 Reset & 기본 스타일 */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: var(--purple-bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

/* 공통 버튼 스타일 */
.btn { display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s ease; gap: 6px; }
.btn-primary { background: var(--purple); color: #FFF; }
.btn-primary:hover { background: var(--purple-3); }
.btn-outline { background: transparent; color: var(--purple); border: 1.5px solid var(--border-2); }
.btn-outline:hover { background: var(--purple-bg); border-color: var(--purple-3); }
.btn-ghost { background: var(--bg); color: var(--ink-3); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-2); }
.btn-danger { background: var(--coral-bg); color: var(--coral); }
.btn-danger:hover { background: var(--coral); color: #FFF; }

/* 테이블 패킹 스타일 */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
th { font-size: 11.5px; padding: 10px 12px; text-transform: uppercase; color: var(--ink-3); letter-spacing: 0.5px; }
td { font-size: 13px; padding: 11px 12px; border-bottom: 1px solid var(--border); }

/* 모달 팝업 구조 */
.modal { padding: 22px 20px !important; width: 88vw !important; max-width: 620px !important; max-height: 88vh; border-radius: 18px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #FFF; box-shadow: 0 12px 36px rgba(0,0,0,0.15); z-index: 1000; }
.modal.open { display: block; }
.modal-footer { gap: 8px; display: flex; justify-content: flex-end; margin-top: 16px; }

/* 입력 폼 최적화 */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; }
.form-input { width: 100%; height: 44px; padding: 0 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--ink); transition: border-color 0.2s; background: #FFF; }
.form-input:focus { border-color: var(--purple); outline: none; }

/* 뱃지 스타일 */
.badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-coral { background: var(--coral-bg); color: var(--coral); }
.badge-gray { background: var(--gray-bg); color: var(--ink-3); }

@media (max-width: 768px) {
  .modal { width: 94vw !important; padding: 16px !important; }
}
</style>

<script>
// 전역 상태 데이터 셋 초기화 정의
let db = { members: [], payments: {}, materials: [], stockLog: [], attendance: {} };
let _currentUser = null;
const _storage = window.localStorage;

// Firebase 연동 베이스 정의
const FB_BASE = "https://example-fallback-default-rtdb.firebaseio.com"; 
let _fbEventSource = null;

// 날짜 헬퍼 함수
function kstDate() { return new Date(new Date().getTime() + (9 * 60 * 60 * 1000)); }
function kstDateStr() { return kstDate().toISOString().split('T')[0]; }
function kstMonthStr() { return kstDateStr().substring(0,7); }
let currentTuitionMonth = kstMonthStr();
let matUseId = null;

// 로컬 DB 로드 함수
function loadDb() {
  try {
    const s = _storage.getItem('luke_artschool_v2');
    if (s) {
      const d = JSON.parse(s);
      if(d.members) db = d;
    }
  } catch(e) { console.error("DB 로드 실패:", e); }
}

function saveDb() {
  try {
    _storage.setItem('luke_artschool_v2', JSON.stringify(db));
    saveSnapshot(); // 데이터 변화 발생 시 상시 스냅샷 누적 저장 백업 호출
  } catch(e) { console.error("DB 저장 실패:", e); }
}

function markDirty(type) { console.log(`[Data Dirty Mark]: ${type}`); }
function toast(msg, isErr=false) { alert(msg); }
function logActivity(action, desc) { console.log(`[로그] ${action}: ${desc}`); }

// 평문 암호 확인 해시 변환용 헬퍼 함수 (PBKDF2/SHA-256 기반 대용 구현)
async function hashPassword(plainText) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plainText);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// 안전한 평문 비밀번호 자동 마이그레이션 함수
async function migratePwIfNeeded() {
  if (db.users) {
    let changed = false;
    for (let u of db.users) {
      // 64글자 미만의 Hex 구조가 아니면 평문으로 간주하여 자동 해싱 마이그레이션
      if (u.password && u.password.length < 64) {
        u.password = await hashPassword(u.password);
        changed = true;
      }
    }
    if (changed) {
      saveDb();
      console.log("평문 비밀번호 정보가 SHA-256 해시로 안전하게 마이그레이션되었습니다.");
    }
  }
}

// 자동 로그인 프로세스 점검
function checkAutoLogin() {
  const saved = _storage.getItem('luke_logged_user');
  if (saved) {
    try {
      _currentUser = JSON.parse(saved);
      showApp();
      return true;
    } catch(e) { return false; }
  }
  return false;
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  renderDashboard();
}

// 로그인 핸들러 통합 구현 (해시 비교 방식 검증 적용)
async function handleLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  
  if(!id || !pw) { toast('아이디와 비밀번호를 입력하세요.', true); return; }
  
  // 기본 관리자 계정 해시화 체크 매칭 예시
  const inputHash = await hashPassword(pw);
  
  // 마이그레이션된 계정 정보 내부에서 룩업 혹은 마스터 관리자 인증 대체 조율
  if(id === "admin" && pw === "luke1234") {
    _currentUser = { id: 'admin', name: '최고관리자', role: 'admin' };
    _storage.setItem('luke_logged_user', JSON.stringify(_currentUser));
    showApp();
    return;
  }
  
  // 개별 사용자 계정이 DB에 존재하는 경우 순회 검증
  if(db.users) {
    const user = db.users.find(u => u.username === id);
    if(user && (user.password === inputHash || user.password === pw)) {
      _currentUser = user;
      _storage.setItem('luke_logged_user', JSON.stringify(_currentUser));
      showApp();
      return;
    }
  }
  
  toast('인증 정보가 올바르지 않습니다.', true);
}

// 권한 확인용 헬퍼 함수
function hasPerm(perm) {
  if(!_currentUser) return false;
  if(_currentUser.role === 'admin') return true;
  return _currentUser.perms && _currentUser.perms.includes(perm);
}

// 안전한 화면 업데이트 및 렌더링 예외 방어 래퍼 
function safeRender(renderFunc, areaId) {
  try { renderFunc(); } 
  catch(e) {
    console.error(`[렌더링 예외 발생 영역: ${areaId}] `, e);
    const el = document.getElementById(areaId);
    if(el) el.innerHTML = `<div class="error-state" style="padding:15px; color:var(--coral);">데이터 서식 구조 표현 중 오류가 발생했습니다.</div>`;
  }
}

// 대시보드 및 요약 바 구조 통합 렌더링 (Undefined 예외 처리 강화)
function renderDashboard() {
  const active = (db.members || []).filter(m => m.status === 'active');
  let pc = 0, ac = 0, pu = 0, au = 0;
  
  active.forEach(m => {
    const k = m.id + '_' + currentTuitionMonth;
    const p = db.payments ? db.payments[k] : null;
    if (p && p.paid) {
      pc++;
      ac += (p.amount || 0);
    } else {
      pu++;
      au += (m.fee || 0);
    }
  });
  
  const summaryEl = document.getElementById('tuitionSummaryBar');
  if (summaryEl) {
    summaryEl.innerHTML = `
      <span class="badge badge-teal" style="padding:6px 14px;font-size:12px;">납부 ${pc}명 · ${ac.toLocaleString()}원</span>
      <span class="badge badge-coral" style="padding:6px 14px;font-size:12px;">미납 ${pu}명 · ${au.toLocaleString()}원</span>
      <span class="badge badge-gray" style="padding:6px 14px;font-size:12px;">전체 ${active.length}명</span>
    `;
  }

  // 자재 재고 부족 알림 예외 처리 렌더링 파트 보호 조치
  const matEl = document.getElementById('dashMaterials');
  if (matEl) {
    const lowMaterials = (db.materials || []).filter(m => {
      const currentQty = parseInt(m.qty) || 0;
      const minQty = parseInt(m.minQty) || 0;
      return currentQty <= minQty;
    });
    
    if(lowMaterials.length === 0) {
      matEl.innerHTML = '<div style="padding:10px; font-size:13px; color:var(--ink-3);">💡 부족하거나 발주가 필요한 자재가 없습니다.</div>';
    } else {
      matEl.innerHTML = lowMaterials.map(m => `
        <div style="padding:8px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:13px; font-weight:500;">${m.name || '이름 없음'} (${m.category || '기타'})</span>
          <span class="badge badge-coral">현재 재고: ${m.qty || 0}${m.unit || '개'} (최소: ${m.minQty || 0})</span>
        </div>
      `).join('');
    }
  }
}

// 자재 입출고 처리 및 차감 수량 조건 방어 모달 처리 함수
function openMatUseModal(id, type) {
  const m = (db.materials || []).find(x => x.id === id);
  if (!m) { toast('자재를 찾을 수 없습니다.', true); return; }
  
  matUseId = id;
  const typeLabel = type === 'add' ? '입고' : '사용';
  document.getElementById('matUseTitle').textContent = (m.name || '') + ' ' + typeLabel;
  document.getElementById('matUseQty').value = '1';
  document.getElementById('matUseType').value = type;
  document.getElementById('matUseMemo').value = '';
  document.getElementById('matUseModal').classList.add('open');
}

function closeMatUseModal() { document.getElementById('matUseModal').classList.remove('open'); }

function confirmMatUse() {
  if (!hasPerm('materials') && _currentUser?.role !== 'admin') {
    toast('권한이 없습니다.', true); return;
  }
  const qty = parseInt(document.getElementById('matUseQty').value) || 1;
  const type = document.getElementById('matUseType').value;
  const memo = document.getElementById('matUseMemo').value.trim();
  
  const i = db.materials.findIndex(m => m.id === matUseId);
  if (i === -1) { toast('자재를 찾을 수 없습니다.', true); return; }
  
  const mat = db.materials[i];
  
  // 자재 필드 기본값 보완 방어선 구축
  mat.qty = parseInt(mat.qty) || 0;
  mat.unit = mat.unit || '개';
  
  if (type === 'use') {
    if (mat.qty < qty) { toast('차감하려는 수량이 현재 보유 재고량보다 많아 재고가 부족합니다.', true); return; }
    mat.qty -= qty;
    toast(`${qty}${mat.unit} 차감되었습니다.`);
  } else {
    mat.qty += qty;
    toast(`${qty}${mat.unit} 입고되었습니다.`);
  }
  
  if (!db.stockLog) db.stockLog = [];
  db.stockLog.unshift({
    id: 'LOG' + Date.now(),
    matId: mat.id,
    matName: mat.name,
    type: type === 'use' ? 'out' : 'in',
    qty: qty,
    memo: memo,
    date: kstDateStr(),
    by: _currentUser?.name || '관리자'
  });
  
  markDirty('materials');
  saveDb();
  closeMatUseModal();
  renderDashboard();
}

// Firebase 이력 백업 스냅샷 관리 스키마 (최근 10개 제한 누적 유지 기법)
const FB_HISTORY_URL = FB_BASE + '/artschool/history.json';

async function fetchWithTimeout(url, options = {}, ms = 10000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

async function saveSnapshot() {
  try {
    const res = await fetchWithTimeout(FB_HISTORY_URL, {}, 8000);
    let history = res.ok ? (await res.json() || []) : [];
    if (!Array.isArray(history)) history = [];
    
    const snap = {
      data: JSON.stringify(db),
      savedAt: Date.now(),
      savedBy: _currentUser?.name || 'admin',
      label: new Date().toLocaleString('ko-KR'),
      memberCount: (db.members || []).length
    };
    
    history.unshift(snap);
    if (history.length > 10) history = history.slice(0, 10); // 최대 10개 유지 규칙 강제 준수
    
    await fetchWithTimeout(FB_HISTORY_URL, {
      method: 'PUT',
      body: JSON.stringify(history)
    }, 8000);
    console.log("원격 Firebase 리얼타임 데이터베이스 백업 히스토리 스냅샷이 누적 갱신되었습니다.");
  } catch(e) { console.warn("원격 히스토리 백업 스냅샷 저장 실패:", e); }
}

// 서비스 워커 버전 체크 선행 제어 컴포넌트
async function checkVersionAndReload() {
  const RELOAD_FLAG = 'luke_sw_reload';
  const last = parseInt(sessionStorage.getItem(RELOAD_FLAG) || '0');
  // 무한 새로고침 간섭 주기를 방지하기 위해 10초 이내 중복 리로드 차단 정의
  if (Date.now() - last < 10000) return;
  sessionStorage.setItem(RELOAD_FLAG, Date.now().toString());
}

// ── 웹 앱 구동 초기 진입 시동 통합 리스너 정의 ──
window.addEventListener('load', async () => {
  await checkVersionAndReload();
  loadDb();
  await migratePwIfNeeded();
  checkAutoLogin();

  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
              });
            }
          });
        });
      })
      .catch(err => console.warn('SW 등록 실패:', err));
  }
});
</script>
